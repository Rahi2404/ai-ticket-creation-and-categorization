<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — IT Support Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/styles.css"/>
</head>
<body class="login-body">
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <span class="login-logo">🎫</span>
        <span class="login-sys">IT Support Portal</span>
      </div>
      <h1 class="login-title">Admin Sign In</h1>
      <p class="login-sub">Restricted access — authorised personnel only</p>

      <div class="error-banner hidden" id="login-error">
        ⚠️ <span id="error-msg">Invalid credentials.</span>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="text-input" type="text" id="username" placeholder="Enter username" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="text-input" type="password" id="password" placeholder="Enter password" required autocomplete="current-password"/>
        </div>
        <button class="btn btn-primary btn-full" type="submit" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="spinner hidden" id="login-spinner"></span>
        </button>
      </form>

      <a href="/portal" class="back-link">← Back to User Portal</a>
    </div>
  </div>
  <div class="toast hidden" id="toast"></div>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/admin.js"></script>
</body>
</html>
