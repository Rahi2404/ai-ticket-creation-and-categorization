<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IT Support Portal — Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/styles.css"/>
</head>
<body class="landing-body">
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>

  <div class="landing-center">
    <div class="landing-logo">🎫</div>
    <h1 class="landing-title">IT Support Portal</h1>
    <p class="landing-sub">AI-Powered Ticket Management System</p>

    <div class="landing-cards">
      <a href="/portal" class="landing-card">
        <span class="lcard-icon">🧑‍💻</span>
        <span class="lcard-title">User Portal</span>
        <span class="lcard-desc">Raise or track a support ticket</span>
      </a>
      <a href="/admin/login" class="landing-card landing-card--admin">
        <span class="lcard-icon">🛡️</span>
        <span class="lcard-title">Admin Panel</span>
        <span class="lcard-desc">Manage and update tickets</span>
      </a>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
